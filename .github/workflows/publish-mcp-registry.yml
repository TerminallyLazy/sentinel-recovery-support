name: Publish MCP Registry

on:
  push:
    branches:
      - main
    paths:
      - mcp/server.json
      - .github/workflows/publish-mcp-registry.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-mcp-registry
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify checksummed MCPB release asset
        shell: bash
        run: |
          set -euo pipefail
          bundle="$RUNNER_TEMP/sentinel-registry-package.mcpb"
          bundle_url="$(jq -r '.packages[0].identifier' mcp/server.json)"
          expected_sha="$(jq -r '.packages[0].fileSha256' mcp/server.json)"
          curl --fail --location --silent --show-error "$bundle_url" --output "$bundle"
          echo "$expected_sha  $bundle" | sha256sum --check --strict

      - name: Install verified MCP publisher
        shell: bash
        env:
          PUBLISHER_VERSION: "1.7.9"
          PUBLISHER_SHA256: "ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac"
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/mcp-publisher_linux_amd64.tar.gz"
          url="https://github.com/modelcontextprotocol/registry/releases/download/v${PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          curl --fail --location --silent --show-error "$url" --output "$archive"
          echo "$PUBLISHER_SHA256  $archive" | sha256sum --check --strict
          tar -xzf "$archive" -C "$RUNNER_TEMP" mcp-publisher
          chmod 0755 "$RUNNER_TEMP/mcp-publisher"

      - name: Validate Registry metadata
        run: '"$RUNNER_TEMP/mcp-publisher" validate mcp/server.json'

      - name: Publish through GitHub OIDC
        shell: bash
        run: |
          set -euo pipefail
          "$RUNNER_TEMP/mcp-publisher" login github-oidc
          "$RUNNER_TEMP/mcp-publisher" publish mcp/server.json
